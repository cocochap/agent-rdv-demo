k<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant RDV</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; }
    .chat-container { width: 380px; height: 600px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 16px 20px; color: white; }
    .chat-header h3 { font-size: 16px; font-weight: 600; }
    .status { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.bot { background: #f0f2f5; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: #667eea; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg a { color: #667eea; font-weight: 600; text-decoration: none; }
    .msg.user a { color: white; text-decoration: underline; }
    .typing { display: flex; gap: 4px; padding: 10px 14px; background: #f0f2f5; border-radius: 12px; border-bottom-left-radius: 4px; align-self: flex-start; }
    .typing span { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }
    .quick-replies { padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .qr-btn { background: white; border: 1.5px solid #667eea; color: #667eea; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all .2s; }
    .qr-btn:hover { background: #667eea; color: white; }
    .input-area { padding: 12px 16px; border-top: 1px solid #f0f2f5; display: flex; gap: 8px; }
    #userInput { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 24px; padding: 10px 16px; font-size: 14px; outline: none; transition: border .2s; }
    #userInput:focus { border-color: #667eea; }
    #sendBtn { background: #667eea; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: transform .1s; }
    #sendBtn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h3>💬 Assistant Virtuel</h3>
    <div class="status"><div class="dot"></div><p>En ligne • Répond instantanément</p></div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="quick-replies" id="quickReplies">
    <button class="qr-btn" onclick="sendQuick('Quels sont vos horaires ?')">🕐 Horaires</button>
    <button class="qr-btn" onclick="sendQuick('Quels sont vos services ?')">✂️ Services</button>
    <button class="qr-btn" onclick="sendQuick('Je veux prendre rendez-vous')">📅 RDV</button>
  </div>
  <div class="input-area">
    <input id="userInput" type="text" placeholder="Écrivez votre message..." />
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>
<script>
  const API_URL = window.location.origin;
  const SESSION_ID = 'session_' + Math.random().toString(36).substr(2, 9);
  const WELCOME = "Bonjour ! Je suis l'assistant du Salon Élégance 💇‍♀️ Comment puis-je vous aider ?";

  window.onload = () => {
    addMessage(WELCOME, 'bot');
    document.getElementById('userInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  };

  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">👉 Prendre RDV ici</a>');
  }

  function addMessage(text, type) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = linkify(text);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing'; div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    document.getElementById('quickReplies').style.display = 'none';
    addMessage(text, 'user');
    input.value = '';
    showTyping();
    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId: SESSION_ID })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.reply, 'bot');
    } catch {
      hideTyping();
      addMessage("Désolé, problème de connexion. Réessayez !", 'bot');
    }
  }

  function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }
</script>
</body>
</html>
